<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyCollections — Blog para Colecionadores</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #F2F4F7; }
    a { color: inherit; }
    button { font-family: inherit; }
    input, textarea { font-family: inherit; }
    h1, h2, h3, h4 { font-family: 'Nunito', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F2F4F7; }
    ::-webkit-scrollbar-thumb { background: #D1D8E0; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #0088CC; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="blog-components.jsx"></script>
  <script type="text/babel" src="blog-home.jsx"></script>
  <script type="text/babel" src="blog-post.jsx"></script>
  <script type="text/babel" src="blog-categories.jsx"></script>
  <script type="text/babel" src="blog-app.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroStyle": "light",
      "accentColor": "#0088CC",
      "fontHeading": "Nunito",
      "showNewsletter": true,
      "postsPerRow": 3
    }/*EDITMODE-END*/;

    const App = () => {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [page, setPageState] = React.useState(() => localStorage.getItem('mc-blog-page') || 'home');
      const mainRef = React.useRef(null);

      const setPage = (p) => {
        setPageState(p);
        localStorage.setItem('mc-blog-page', p);
        if (mainRef.current) mainRef.current.scrollTop = 0;
        window.scrollTo(0, 0);
      };

      // Inject accent color override
      React.useEffect(() => {
        document.documentElement.style.setProperty('--color-blue-500', tweaks.accentColor);
        document.documentElement.style.setProperty('--bg-brand', tweaks.accentColor);
        document.documentElement.style.setProperty('--fg-link', tweaks.accentColor);
      }, [tweaks.accentColor]);

      return (
        <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
          <Header page={page} setPage={setPage} />
          <main ref={mainRef} style={{ flex: 1 }}>
            {page === 'home'       && <HomePage setPage={setPage} heroStyle={tweaks.heroStyle} showNewsletter={tweaks.showNewsletter} />}
            {page === 'post'       && <PostPage setPage={setPage} />}
            {page === 'categories' && <CategoriesPage setPage={setPage} />}
            {page === 'app'        && <AppPage setPage={setPage} />}
          </main>
          <Footer setPage={setPage} />

          <TweaksPanel>
            <TweakSection title="Hero">
              <TweakRadio id="heroStyle" label="Estilo do hero"
                options={[{ value: 'light', label: 'Claro' }, { value: 'dark', label: 'Azul' }]}
              />
            </TweakSection>
            <TweakSection title="Cores">
              <TweakColor id="accentColor" label="Cor de destaque" />
            </TweakSection>
            <TweakSection title="Tipografia">
              <TweakSelect id="fontHeading" label="Fonte dos títulos"
                options={[
                  { value: 'Nunito', label: 'Nunito (padrão)' },
                  { value: 'DM Sans', label: 'DM Sans' },
                  { value: 'Georgia', label: 'Georgia (serif)' },
                ]}
              />
            </TweakSection>
            <TweakSection title="Conteúdo">
              <TweakToggle id="showNewsletter" label="Newsletter no rodapé" />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
